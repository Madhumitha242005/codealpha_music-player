<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Music Player</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e1e2f,#12121c);
  color:#fff;
}

/* PLAYER CARD */
.player{
  width:340px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  text-align:center;
  transition:0.3s;
}

.player img{
  width:160px;
  height:160px;
  border-radius:15px;
  object-fit:cover;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

h2{ font-size:18px; margin-bottom:5px; }
p{ font-size:13px; color:#aaa; margin-bottom:15px; }

/* CONTROLS */
.controls button{
  background:#ff9800;
  border:none;
  color:#fff;
  padding:12px;
  margin:5px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.controls button:hover{
  transform:scale(1.1);
  background:#ff5722;
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:5px;
  color:#aaa;
}

input[type="range"]{
  width:100%;
  margin:10px 0;
  accent-color:#ff9800;
  cursor:pointer;
}

ul{
  list-style:none;
  margin-top:15px;
  max-height:120px;
  overflow-y:auto;
}

li{
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  font-size:13px;
  transition:0.3s;
}

li:hover, li.active{
  background:#ff9800;
}
</style>
</head>

<body>

<div class="player">
  <img id="cover" src="" alt="cover">
  <h2 id="title"></h2>
  <p id="artist"></p>

  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="shuffleSong()">🔀</button>
    <button onclick="prevSong()">⏮</button>
    <button onclick="playPause()" id="playBtn">▶</button>
    <button onclick="nextSong()">⏭</button>
    <button onclick="repeatSong()">🔁</button>
  </div>

  <input type="range" id="progress" value="0">
  <div class="time">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <input type="range" id="volume" min="0" max="1" step="0.1" value="1">

  <ul id="playlist"></ul>
</div>

<script>
const songs = [
{
  title:"Chill Track",
  artist:"Artist One",
  src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
  cover:"https://picsum.photos/200?1"
},
{
  title:"Relax Beat",
  artist:"Artist Two",
  src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
  cover:"https://picsum.photos/200?2"
},
{
  title:"Focus Music",
  artist:"Artist Three",
  src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
  cover:"https://picsum.photos/200?3"
}
];

let currentIndex = 0;
let isRepeat = false;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const playlist = document.getElementById("playlist");
const playBtn = document.getElementById("playBtn");

function loadSong(index){
  const song = songs[index];
  audio.src = song.src;
  title.textContent = song.title;
  artist.textContent = song.artist;
  cover.src = song.cover;
  updatePlaylist();
}

function playPause(){
  if(audio.paused){
    audio.play();
    playBtn.textContent="⏸";
  }else{
    audio.pause();
    playBtn.textContent="▶";
  }
}

function nextSong(){
  currentIndex = (currentIndex+1)%songs.length;
  loadSong(currentIndex);
  audio.play();
}

function prevSong(){
  currentIndex = (currentIndex-1+songs.length)%songs.length;
  loadSong(currentIndex);
  audio.play();
}

function shuffleSong(){
  currentIndex = Math.floor(Math.random()*songs.length);
  loadSong(currentIndex);
  audio.play();
}

function repeatSong(){
  isRepeat = !isRepeat;
  audio.loop = isRepeat;
}

audio.addEventListener("timeupdate",()=>{
  progress.value = (audio.currentTime/audio.duration)*100||0;
  document.getElementById("currentTime").textContent = formatTime(audio.currentTime);
  document.getElementById("duration").textContent = formatTime(audio.duration);
});

progress.addEventListener("input",()=>{
  audio.currentTime = (progress.value/100)*audio.duration;
});

volume.addEventListener("input",()=>{
  audio.volume = volume.value;
});

audio.addEventListener("ended",()=>{
  if(!isRepeat) nextSong();
});

function formatTime(time){
  if(isNaN(time)) return "0:00";
  const minutes = Math.floor(time/60);
  const seconds = Math.floor(time%60).toString().padStart(2,"0");
  return minutes+":"+seconds;
}

function updatePlaylist(){
  playlist.innerHTML="";
  songs.forEach((song,index)=>{
    const li=document.createElement("li");
    li.textContent=song.title;
    if(index===currentIndex) li.classList.add("active");
    li.onclick=()=>{
      currentIndex=index;
      loadSong(index);
      audio.play();
    };
    playlist.appendChild(li);
  });
}

loadSong(currentIndex);
</script>

</body>
</html>
